<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jay Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#f5f7fa; }
    .card { border-radius:15px; }
  </style>
</head>
<body>

<div class="container py-4">
  <h2 class="text-center mb-4">📚 Jay Library Management System</h2>

  <!-- Add Book -->
  <div class="card p-3 mb-3">
    <h5>Add Book</h5>
    <input id="bookName" class="form-control mb-2" placeholder="Book Name">
    <input id="bookTime" class="form-control mb-2" type="time">
    <button class="btn btn-primary" onclick="addBook()">Add Book</button>
  </div>

  <!-- Book List -->
  <div class="card p-3 mb-3">
    <h5>Book List</h5>
    <ul id="bookList" class="list-group"></ul>
  </div>

  <!-- Time Management Chart -->
  <div class="card p-3 mb-3">
    <h5>Time Usage Chart</h5>
    <canvas id="chart"></canvas>
  </div>

  <!-- Submit Report -->
  <div class="card p-3">
    <h5>Submit to Library Head</h5>
    <textarea id="report" class="form-control mb-2" placeholder="Write report..."></textarea>
    <button class="btn btn-success" onclick="submitReport()">Submit</button>
  </div>
</div>

<script>
  let books = [];

  function addBook() {
    let name = document.getElementById('bookName').value;
    let time = document.getElementById('bookTime').value;

    if(name === '' || time === ''){
      alert('Fill all fields');
      return;
    }

    books.push({name, time});
    displayBooks();
    updateChart();
  }

  function displayBooks() {
    let list = document.getElementById('bookList');
    list.innerHTML = '';

    books.forEach((b, i) => {
      list.innerHTML += `<li class="list-group-item">${b.name} - ${b.time}</li>`;
    });
  }

  function submitReport(){
    let report = document.getElementById('report').value;
    if(report === ''){
      alert('Write report first');
      return;
    }
    alert('Report submitted to Library Head');
  }

  let ctx = document.getElementById('chart');
  let chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [],
      datasets: [{ label: 'Reading Time', data: [] }]
    }
  });

  function updateChart(){
    chart.data.labels = books.map(b => b.name);
    chart.data.datasets[0].data = books.map(b => parseInt(b.time.split(':')[0]));
    chart.update();
  }
</script>

</body>
</html>
